spring.application.name=PruebaTecSupermercado

# ==========================
# DATASORCE (H2)
# ==========================

spring.datasource.url=jdbc:h2:mem:superdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=fabrizzioDev
spring.datasource.password=

# =========================
# JPA / HIBERNATE
# =========================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Para queu H2 se porte como MYSQL (es importante para testing)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# =========================
# H2 CONSOLE
# =========================

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console